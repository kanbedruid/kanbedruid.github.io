<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>饭店评分榜</title>
<style>
  :root {
    --paper: #f5ecd7;
    --paper-2: #efe3c2;
    --ink: #3b2f1e;
    --ink-soft: #6b5a3e;
    --line: #c9b78a;
    --accent: #a4552e;
    --accent-2: #7a8a3a;
    --shadow: 0 1px 0 rgba(0,0,0,.04), 0 8px 24px rgba(90,60,20,.08);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--paper); color: var(--ink);
    font-family: "Songti SC","STSong","Noto Serif SC",Georgia,"Times New Roman",serif; }
  body {
    background-image:
      radial-gradient(rgba(120,90,30,.06) 1px, transparent 1px),
      radial-gradient(rgba(120,90,30,.05) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
  }
  header {
    padding: 28px 20px 8px; text-align: center;
    border-bottom: 1px dashed var(--line);
  }
  h1 { margin: 0 0 6px; font-size: 30px; letter-spacing: 6px; }
  .sub { color: var(--ink-soft); font-size: 13px; letter-spacing: 2px; }
  .tabs { display: flex; justify-content: center; gap: 8px; margin: 18px 0 0; }
  .tab {
    background: transparent; border: 1px solid var(--line); color: var(--ink);
    padding: 8px 18px; cursor: pointer; font: inherit; letter-spacing: 2px;
    border-radius: 999px; transition: .2s;
  }
  .tab.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  main { max-width: 1080px; margin: 0 auto; padding: 20px; }
  .panel { background: var(--paper-2); border: 1px solid var(--line);
    border-radius: 6px; padding: 16px; box-shadow: var(--shadow); }
  .filters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
  .filters input, .filters select {
    width: 100%; padding: 8px 10px; background: var(--paper);
    border: 1px solid var(--line); color: var(--ink);
    font: inherit; border-radius: 4px;
  }
  .filters button {
    background: var(--accent); color: var(--paper); border: none; padding: 8px 10px;
    border-radius: 4px; cursor: pointer; font: inherit;
  }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { padding: 10px 8px; text-align: left; border-bottom: 1px dashed var(--line); }
  th { color: var(--ink-soft); font-weight: 600; letter-spacing: 1px; cursor: pointer; user-select: none; }
  th.sorted::after { content: attr(data-arrow); margin-left: 4px; color: var(--accent); }
  tbody tr:hover { background: rgba(255,255,255,.35); }
  .rank { width: 46px; color: var(--accent); font-weight: 700; }
  .score { color: var(--accent); font-weight: 600; }
  .tag { display: inline-block; padding: 1px 8px; border: 1px solid var(--line);
    border-radius: 999px; font-size: 12px; color: var(--ink-soft); margin-right: 4px; }
  .empty { padding: 40px; text-align: center; color: var(--ink-soft); }
  #mapWrap { position: relative; }
  svg#map { width: 100%; height: auto; display: block; background: transparent; }
  svg#map path.country { fill: #d9cfb3; stroke: var(--paper); stroke-width: .5; transition: fill .15s; }
  svg#map path.country.active { fill: #c78552; cursor: pointer; }
  svg#map path.country.active:hover { fill: var(--accent); }
  svg#map path.country.selected { fill: var(--ink); }
  .tooltip {
    position: absolute; pointer-events: none; background: var(--ink); color: var(--paper);
    padding: 6px 10px; border-radius: 4px; font-size: 12px; line-height: 1.5; white-space: nowrap;
    transform: translate(-50%, -110%); opacity: 0; transition: opacity .1s;
  }
  .tooltip.show { opacity: 1; }
  .legend { display: flex; gap: 14px; justify-content: center; margin-top: 10px;
    color: var(--ink-soft); font-size: 12px; flex-wrap: wrap; }
  .legend .sw { display: inline-block; width: 14px; height: 10px; margin-right: 6px; vertical-align: middle; border: 1px solid var(--line); }
  .country-detail { margin-top: 16px; }
  .country-detail h3 { margin: 0 0 8px; letter-spacing: 2px; }
  footer { padding: 20px; text-align: center; color: var(--ink-soft); font-size: 12px; }
  .err { color: #a02c2c; padding: 12px; }
  @media (max-width: 720px) {
    .filters { grid-template-columns: 1fr 1fr; }
    h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<header>
  <h1>饭店评分榜</h1>
  <div class="sub">CREAM · PAPER · GUIDE</div>
  <nav class="tabs">
    <button class="tab active" data-tab="list">排 行 榜</button>
    <button class="tab" data-tab="map">美 食 地 图</button>
  </nav>
</header>

<main>
  <section id="tab-list" class="panel">
    <div class="filters">
      <input id="f-name" placeholder="按饭店名搜索…" />
      <select id="f-loc"><option value="">全部位置</option></select>
      <select id="f-cat"><option value="">全部类别</option></select>
      <button id="f-reset">重置</button>
    </div>
    <div id="listBody"><div class="empty">正在加载 饭店评分.xlsx …</div></div>
  </section>

  <section id="tab-map" class="panel" style="display:none">
    <div id="mapWrap">
      <svg id="map" viewBox="0 0 1000 500" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="tooltip" id="tip"></div>
    </div>
    <div class="legend">
      <span><span class="sw" style="background:#d9cfb3"></span>无数据</span>
      <span><span class="sw" style="background:#c78552"></span>有餐厅</span>
      <span><span class="sw" style="background:#3b2f1e"></span>已选中</span>
    </div>
    <div class="country-detail" id="countryDetail">
      <div class="empty">点击高亮的国家查看该国餐厅</div>
    </div>
  </section>
</main>

<footer>数据源：同目录下 饭店评分.xlsx · 本地离线运行</footer>

<script src="./lib/xlsx.full.min.js"></script>
<script src="./lib/topojson-client.min.js"></script>
<script src="./country-map.js"></script>
<script src="./app.js"></script>
</body>
</html>
