<!doctype html>
<html lang="zh-CN">

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>小德美食指南 · Xiaode Guide</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header class="hero">

    <div class="brand">

        <h1>
            小德美食指南
        </h1>

        <p>
            XIAODE GUIDE · RESTAURANT COLLECTION
        </p>

    </div>


    <nav class="nav">

        <button 
        class="nav-btn active"
        data-page="ranking">
            排行榜
        </button>


        <button 
        class="nav-btn"
        data-page="map">
            美食地图
        </button>


        <button 
        class="nav-btn"
        data-page="collection">
            图鉴
        </button>

    </nav>


</header>



<main>


<!-- ======================
     排行榜页面
====================== -->


<section 
id="ranking"
class="page active">


<div class="toolbar">


<input
id="search-name"
placeholder="搜索饭店名称">


<input
id="search-location"
placeholder="搜索位置">


<input
id="search-category"
placeholder="搜索类别">



<button
id="reset-filter">

全部

</button>


</div>



<div id="restaurant-list">


<div class="loading">

正在读取饭店评分.xlsx...

</div>


</div>



</section>





<!-- ======================
     地图页面
====================== -->


<section
id="map"
class="page">



<div class="map-layout">



<div class="map-box">


<div class="map-control">


<button onclick="zoomMap(0.2)">+</button>

<button onclick="zoomMap(-0.2)">-</button>

<button onclick="zoomMap(0)">⌂</button>


<button id="zoom-out">
-
</button>


<button id="zoom-reset">
⌂
</button>


</div>



<svg
id="world-map"
viewBox="0 0 1000 500">

</svg>



</div>





<div class="country-panel">


<div class="empty">

点击地图上的国家

查看美食记录

</div>



</div>



</div>



</section>





<!-- ======================
     图鉴页面
====================== -->


<section
id="collection"
class="page">


<div class="collection-header">


<h2>
我的美食图鉴
</h2>


<p>
记录每一家尝试过的餐厅
</p>


</div>



<div id="collection-list">


</div>



</section>



</main>





<footer>


数据来源：

饭店评分.xlsx


</footer>




<!-- 本地库 -->

<script src="lib/xlsx.full.min.js"></script>

<script src="lib/topojson-client.min.js"></script>


<!-- 地图数据 -->

<script src="country-map.js"></script>


<!-- 国家识别 -->

<script src="country-data.js"></script>


<!-- 主逻辑 -->

<script src="app.js"></script>



</body>

</html>
