<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>山海经模拟器</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-base: #07090e;
            --panel-bg: rgba(18, 24, 38, 0.75);
            --panel-border: rgba(255, 255, 255, 0.08);
            --accent-gold: #f59e0b;
            --accent-cyan: #06b6d4;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.4); }

        body { 
            margin: 0; 
            font-family: 'Microsoft YaHei', sans-serif; 
            background: radial-gradient(circle at top, #1e293b, var(--bg-base)); 
            color: var(--text-main); 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            flex-direction: row; 
        }
        
        .sidebar { 
            background: var(--panel-bg); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 20px; 
            box-sizing: border-box; 
            display: flex; 
            flex-direction: column; 
            gap: 15px; 
            overflow-y: auto;
            border: 1px solid var(--panel-border);
            box-shadow: var(--glass-shadow);
            z-index: 20;
        }
        #sidebar-left { width: 300px; min-width: 300px; border-right: 1px solid var(--panel-border); }
        #sidebar-right { width: 300px; min-width: 300px; border-left: 1px solid var(--panel-border); padding: 15px; }
        
        #main-view { flex: 1; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        #topbar-hud { 
            position: absolute; 
            top: 20px; 
            right: 20px; 
            background: rgba(10, 15, 25, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--panel-border);
            border-radius: 30px;
            padding: 8px 20px;
            display: flex; 
            align-items: center; 
            gap: 15px;
            z-index: 10;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #canvas-wrapper { flex: 1; position: absolute; width: 100%; height: 100%; background: #0c1821; cursor: grab; overflow: hidden; touch-action: none; } 
        #canvas-wrapper.drawing { cursor: crosshair; }
        #canvas-wrapper.placing { cursor: none; }
        #canvas-wrapper:active:not(.drawing):not(.placing) { cursor: grabbing; }
        #gameCanvas { image-rendering: pixelated; position: absolute; top:0; left:0; }
        
        #action-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            z-index: 100;
            background: rgba(15, 23, 42, 0.65);
            padding: 12px 25px;
            border-radius: 50px;
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .summon-btn {
            padding: 12px 35px;
            font-size: 16px;
            font-weight: bold;
            font-family: 'Microsoft YaHei', sans-serif;
            border-radius: 30px;
            letter-spacing: 2px;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .btn-gacha {
            background: linear-gradient(135deg, #8b5cf6, #6d28d9);
            box-shadow: 0 4px 15px rgba(139, 92, 246, 0.4);
        }
        .btn-random {
            background: linear-gradient(135deg, #0ea5e9, #0369a1);
            box-shadow: 0 4px 15px rgba(14, 165, 233, 0.4);
        }
        .summon-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255,255,255,0.25);
            filter: brightness(1.1);
        }
        
        #event-ticker { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); pointer-events: none; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; width: 80%;}
        .log-item { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.05); padding: 10px 25px; border-radius: 30px; font-size: 16px; font-weight: bold; color: #fff; animation: fadeUp 5s forwards; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3);}
        @keyframes fadeUp { 0% { opacity: 0; transform: translateY(15px) scale(0.95); } 10% { opacity: 1; transform: translateY(0) scale(1); } 80% { opacity: 1; } 100% { opacity: 0; transform: translateY(-20px); } }

        h1, h2 { font-size: 20px; margin: 0; color: var(--accent-gold); text-align: center; text-shadow: 0 2px 10px rgba(245, 158, 11, 0.2); letter-spacing: 2px;}
        .author-text { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 5px; margin-bottom: 10px; letter-spacing: 1px; font-style: italic; opacity: 0.8; }
        
        .panel { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; border: 1px solid var(--panel-border); }
        .panel label { display: block; margin-bottom: 8px; font-size: 13px; color: #cbd5e1; font-weight: bold;}
        
        input[type="range"] { width: 100%; margin-bottom: 5px; accent-color: var(--accent-cyan); }
        button.tool-btn { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 8px; transition: 0.2s;}
        button.tool-btn:hover { background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.3);}
        button.btn-danger { background: rgba(231, 76, 60, 0.15); border-color: rgba(231, 76, 60, 0.3); color: #ff7675; }
        button.btn-danger:hover { background: rgba(231, 76, 60, 0.3); border-color: #ff7675;}
        
        .terrain-btn { width: 31%; margin: 1%; padding: 10px 0; float: left; border: 1px solid transparent; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; text-align: center; transition: 0.2s; opacity: 0.7;}
        .terrain-btn:hover { opacity: 0.9; }
        .terrain-btn.active { border-color: #fff; transform: scale(1.05); opacity: 1; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .clear { clear: both; }
        
        .info-row { display: flex; justify-content: space-between; margin-bottom: 5px; font-size: 13px; }
        
        #gacha-modal { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); z-index: 1000; align-items: center; justify-content: center; overflow-y: auto; padding: 20px 0;}
        .card-container { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1200px; padding-top: 20px;}
        
        .unified-card { padding: 15px; border-radius: 12px; text-align: center; border: 1px solid var(--panel-border); position: relative; display: flex; flex-direction: column; background: rgba(20, 25, 35, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); box-sizing: border-box; box-shadow: var(--glass-shadow);}
        .gacha-mode { width: 280px; cursor: pointer; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); border: 2px solid rgba(255,255,255,0.1); }
        .gacha-mode:hover { transform: translateY(-15px) scale(1.02); box-shadow: 0 15px 35px rgba(245, 158, 11, 0.3); border-color: var(--accent-gold);}
        .sidebar-mode { width: 100%; padding: 0; border: none; background: transparent; box-shadow: none; backdrop-filter: none; -webkit-backdrop-filter: none;}
        
        .unified-card canvas { margin: 0 auto 15px auto; display: block; background: rgba(0,0,0,0.5); border-radius: 10px; border: 1px solid var(--panel-border); box-shadow: inset 0 2px 10px rgba(0,0,0,0.5);}
        .rarity-tag { position: absolute; top: -12px; left: 50%; transform: translateX(-50%); padding: 4px 18px; border-radius: 20px; font-weight: bold; font-size: 12px; color: #fff; border: 1px solid rgba(255,255,255,0.3); box-shadow: 0 4px 10px rgba(0,0,0,0.4); letter-spacing: 2px; z-index: 5; text-shadow: 0 1px 2px rgba(0,0,0,0.5);}
        
        #tips { position: absolute; bottom: 90px; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 12px 25px; border-radius: 30px; pointer-events: none; display: none; z-index: 50; color: #f1c40f; font-weight: bold; box-shadow: 0 10px 25px rgba(0,0,0,0.5); letter-spacing: 1px;}
        
        .progress-bar-container { width: 100px; height: 8px; background: rgba(0,0,0,0.5); border-radius: 4px; overflow: hidden; display: inline-block; vertical-align: middle; margin: 0 10px;}
        #time-progress { width: 0%; height: 100%; background: #fbc531; transition: width 0.1s linear; box-shadow: 0 0 10px #fbc531;}

        #creature-list { flex: 1; overflow-y: auto; overflow-x: hidden; margin-bottom: 10px; display: flex; flex-direction: column; gap: 6px;}
        .list-item { background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .list-item:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.1); }
        .list-item.active { background: rgba(245, 158, 11, 0.1); border-color: var(--accent-gold); box-shadow: inset 0 0 15px rgba(245, 158, 11, 0.1); }
        
        #info-panel-container { flex-shrink: 0; max-height: 55%; overflow-y: auto; background: rgba(0,0,0,0.2); border-radius: 12px; border: 1px solid var(--panel-border); padding: 15px; margin-top: 10px;}

        /* 手机端横屏适配与竖屏提示 */
        #portrait-warning {
            display: none;
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-base); z-index: 99999;
            color: var(--accent-gold); flex-direction: column;
            align-items: center; justify-content: center; font-weight: bold; font-size: 20px; text-align: center;
        }
        /* 只要是竖屏且屏幕较窄，就全屏遮罩提示横屏 */
        @media (orientation: portrait) and (max-width: 800px) {
            #portrait-warning { display: flex; }
        }
        /* 屏幕较小（手机横屏）时，稍微缩窄侧边栏给地图留空间 */
        @media (max-width: 950px) {
            #sidebar-left { width: 220px; min-width: 220px; padding: 10px; }
            #sidebar-right { width: 220px; min-width: 220px; padding: 10px; }
            .panel { padding: 10px; }
            h1, h2 { font-size: 16px; }
            #topbar-hud { top: 10px; right: 10px; padding: 5px 10px; gap: 8px; font-size: 12px; }
            #action-bar { bottom: 10px; padding: 8px 15px; gap: 10px; width: auto; white-space: nowrap; }
            .summon-btn { padding: 8px 15px; font-size: 13px; }
            #tips { bottom: 60px; font-size: 12px; padding: 6px 12px; }
            .terrain-btn { padding: 6px 0; font-size: 11px; }
        }
    </style>
</head>
<body>
    <div id="portrait-warning">
    <div style="font-size: 50px; margin-bottom: 20px;"></div>
    请使用电脑端体验<br><span style="font-size: 14px; color: #94a3b8; margin-top: 10px;"></span>
</div>

<audio id="bgm-day" src="bgm1.mp3" loop></audio>
<audio id="bgm-night" src="bgm2.mp3" loop></audio>

<div class="sidebar" id="sidebar-left">
    <div style="text-align: center;">
        <h1>山海经模拟器</h1>
        <div class="author-text">作者：神户小德</div>
    </div>
<div class="panel">
        <label>⚙️ 全局设置</label>
        <div class="info-row" style="margin-top:5px;"><span class="info-label" style="color:#94a3b8;">音乐音量</span></div>
        <input type="range" id="volume-slider" min="0" max="100" value="30">
        <div id="excel-status" style="font-size: 12px; color: #fbc531; margin-top:8px; line-height: 1.4; text-align:center;">正在感知天地法则 (读取中)...</div>
    </div>

    <div class="panel">
        <label>🌍 地图生成</label>
        <button class="tool-btn" onclick="Game.generateMap('noise')">🎲 随机生成地形</button>
        <button class="tool-btn" onclick="Game.generateMap('grass')" style="opacity: 0.8;">🌱 重置为纯草地</button>
        <button class="tool-btn btn-danger" onclick="Game.clearCreatures()" style="margin-top: 15px;">🗑️ 抹杀所有生物</button>
    </div>

    <div class="panel">
        <label>🖌️ 神笔涂抹</label>
        <div id="terrain-selector"></div>
        <div class="clear"></div>
        <div style="margin-top:10px;">
            <label style="display:inline-block;">笔刷粗细: <span id="brush-size-txt" style="color:var(--accent-cyan);">2</span></label>
            <input type="range" id="brush-size" min="1" max="10" value="2" oninput="document.getElementById('brush-size-txt').innerText=this.value; Game.brushSize = parseInt(this.value);">
        </div>
    </div>
    
    <div class="panel">
        <label style="display:inline-block;">🔍 视界缩放: <span id="zoom-txt" style="color:var(--accent-cyan);">6</span>x</label>
        <input type="range" id="zoom" min="2" max="15" value="6" oninput="document.getElementById('zoom-txt').innerText=this.value; Game.zoom = parseInt(this.value); Game.draw();">
    </div>
</div>

<div id="main-view">
    <div id="topbar-hud">
        <span id="time-txt" style="color: #fbc531; font-weight: bold; font-size: 13px;">☀ 日间</span>
        <div class="progress-bar-container">
            <div id="time-progress"></div>
        </div>
        <button id="pause-btn" class="tool-btn" onclick="Game.togglePause()" style="margin: 0; padding: 5px 12px; width: auto; font-size:12px; background: rgba(255,255,255,0.1); border:none;">⏸️ 暂停</button>
    </div>
    
    <div id="event-ticker"></div>
    <div id="canvas-wrapper"><canvas id="gameCanvas"></canvas></div>
    
    <div id="action-bar">
        <button class="summon-btn btn-gacha" onclick="Game.openGacha()">✨ 召唤异兽</button>
        <button class="summon-btn btn-random" onclick="Game.randomSummon()">⚡ 随机降临</button>
    </div>

    <div id="tips">正黏在你的指针上，点击左键放置！</div>
</div>

<div class="sidebar" id="sidebar-right">
    <h2>灵兽图鉴</h2>
    <div style="height:10px;"></div>
    <div id="creature-list"></div>
    <div id="info-panel-container" style="display:none;"></div>
</div>

<div id="gacha-modal">
    <div class="card-container" id="gacha-cards"></div>
</div>

<script>
const TERRAIN_TYPES = {
    0: { name: "水", color: "#2980b9", walkable: ["水栖", "飞行", "水陆", "水空", "水陆空", "陆空"], txtColor: "#fff" },
    1: { name: "沙地", color: "#e4c580", walkable: ["陆地", "飞行", "水陆", "陆空", "水空", "水陆空"], txtColor: "#333" },
    2: { name: "草地", color: "#4caf50", walkable: ["陆地", "飞行", "水陆", "陆空", "水空", "水陆空"], txtColor: "#fff" },
    3: { name: "丛林", color: "#1b5e20", walkable: ["陆地", "飞行", "水陆", "陆空", "水空", "水陆空"], txtColor: "#fff" },
    4: { name: "土", color: "#b07e54", walkable: ["陆地", "飞行", "水陆", "陆空", "水空", "水陆空"], txtColor: "#fff" },
    5: { name: "岩石", color: "#7f8c8d", walkable: ["陆地", "飞行", "陆空", "水陆空"], txtColor: "#fff" },
    6: { name: "雪地", color: "#f1f2f6", walkable: ["陆地", "飞行", "水陆", "陆空", "水空", "水陆空"], txtColor: "#000" },
    7: { name: "岩浆", color: "#d35400", walkable: ["陆地", "水栖", "飞行", "水陆", "水空", "陆空", "水陆空"], txtColor: "#fff" }
};
const MOVE_TYPES = ["陆地", "水栖", "飞行", "水陆", "水空", "陆空", "水陆空"];
const MOVE_PATTERNS = ["游荡", "领主", "迁徙", "难以预测"];
const PERSONALITIES = ["凶猛", "凶猛", "凶猛", "凶猛", "贪食", "贪食", "和平", "和平", "胆小", "懒惰"];
const isAggressive = (pers) => ["凶猛", "贪食"].includes(pers);

const PREFIXES = ["狴","狻","饕","餮","貔","貅","玱","珖","傒","梵","冥","魑","魅","魍","魉","朏","蠪","猼","讙", "幽", "玄", "赤", "苍", "煌", "极", "混沌", "太虚", "九幽", "八荒", "灵", "幻", "煞", "劫", "蛊", "渊", "绝", "孤", "天", "地", "洪", "星", "月"];
const SUFFIXES = ["狰","驳","蛟","螭","虬","獓","狠","鸢","鳐","蛭","兕","獙","絜","峳","獔","犰","狳", "鹏", "鲲", "猿", "狨", "狐", "虺", "蟒", "鳄", "凰", "鸾", "雀", "枭", "獒", "狮", "豹", "罴", "犀", "象", "蛊", "灵", "魔", "仙", "皇", "帝"];

const RARITY_COLORS = {"传说":"#f1c40f", "超稀有":"#a29bfe", "稀有":"#74b9ff", "普通":"#dcdde1", "专属":"#ff9a9e"};

let DB_TALENTS = [];
let DB_LEGENDS = [];

const Noise = {
    seed: Math.random(),
    hash: function(x, y) {
        let n = Math.sin(x * 12.9898 + y * 78.233 + this.seed) * 43758.5453123;
        return n - Math.floor(n);
    },
    get: function(x, y, scale = 0.05) {
        let nx = x * scale, ny = y * scale;
        let ix = Math.floor(nx), iy = Math.floor(ny);
        let fx = nx - ix, fy = ny - iy;
        let i1 = this.hash(ix, iy) * (1 - fx) + this.hash(ix + 1, iy) * fx;
        let i2 = this.hash(ix, iy + 1) * (1 - fx) + this.hash(ix + 1, iy + 1) * fx;
        return i1 * (1 - fy) + i2 * fy;
    }
};

function getSpeedDesc(val) {
    if(val >= 9) return "极快";
    if(val >= 7) return "快";
    if(val >= 5) return "普通";
    if(val >= 3) return "慢";
    return "极慢";
}

function getAtkSpeedDesc(val) {
    if(val <= 0.32) return "非常快";
    if(val <= 0.44) return "快";
    if(val <= 0.55) return "普通";
    if(val <= 0.66) return "慢";
    return "非常慢";
}

function getColoredName(c) {
    return `<span style="color:${RARITY_COLORS[c.rarity] || '#fff'}">[${c.name}]</span>`;
}

function generateUnifiedCardHTML(c, canvasId, isSidebar) {
    let baseVision = Game.isDay ? c.dayVision : c.nightVision;
    let actualVision = Game.triggerTalent ? Game.triggerTalent('onVision', c, null, baseVision) : baseVision;

    let bgColor = "transparent", borderColor = "rgba(255,255,255,0.1)", tagHtml = "";
    
    if(!isSidebar) {
        if(c.rarity === '稀有') { borderColor = "rgba(116, 185, 255, 0.5)"; tagHtml = `<div class="rarity-tag" style="background:linear-gradient(90deg, #3498db, #74b9ff);">稀有！</div>`; }
        else if(c.rarity === '超稀有') { borderColor = "rgba(162, 155, 254, 0.6)"; tagHtml = `<div class="rarity-tag" style="background:linear-gradient(90deg, #9b59b6, #a29bfe);">超稀有！</div>`; }
        else if(c.rarity === '传说') { borderColor = "rgba(241, 196, 15, 0.8)"; tagHtml = `<div class="rarity-tag" style="background:linear-gradient(90deg, #e67e22, #f1c40f); color:#000;">传说！</div>`; }
    } else {
        borderColor = "transparent";
    }

    let talentHTML = '';
    if(c.talents.length === 0) {
        talentHTML = '<div style="color:#7f8fa6;font-size:12px; margin-top:5px; font-style:italic;">暂无天赋</div>';
    } else {
        c.talents.forEach(tID => {
            let tData = DB_TALENTS.find(t => t.TalentID == tID);
            if(tData) {
                let tColor = "#dcdde1";
                if(tData.Rarity === '蓝') tColor = "#3498db";
                else if(tData.Rarity === '紫') tColor = "#a29bfe";
                else if(tData.Rarity === '橙') tColor = "#f1c40f";
                else if(tData.Rarity === '专属') tColor = "#ff7675"; 

                talentHTML += `
                    <div style="text-align:left; margin-top:6px; padding:8px 10px; background:rgba(0,0,0,0.3); border-left: 3px solid ${tColor}; border-radius: 4px; box-shadow: inset 0 0 10px rgba(0,0,0,0.5);">
                        <div style="font-weight: bold; font-size:13px; margin-bottom:3px; color:${tColor}; letter-spacing:1px;">${tData.Name}</div>
                        <div style="font-size:11px; line-height:1.5; color:#cbd5e1; opacity:0.9;">${tData.Description}</div>
                    </div>`;
            }
        });
    }

    let sizeName = ["小型", "中型", "大型", "巨型"][c.sizeLevel-1];
    let titleColor = c.rarity === '传说' ? '#f1c40f' : c.color;

            <div style="font-size:12px; color:#94a3b8; margin-bottom:12px;">${c.rarity} / ${sizeName} / ${c.personality} / ${c.movePattern}</div>
            
            <div style="font-size:12px; color:#e2e8f0; text-align:left; line-height:1.6; display:grid; grid-template-columns: 1fr 1fr; gap:6px; background:rgba(0,0,0,0.4); padding:12px; border-radius:8px; margin-bottom:10px; border:1px solid rgba(255,255,255,0.05);">

                    ☠️击杀数: <span style="color:#ff7675; font-weight:bold; font-size:14px;">${c.kills || 0}</span>
                </div>

                <div>⚔️攻击: <span style="color:#e74c3c;">${c.atk}</span></div>
                <div>🛡️防御: <span style="color:#3498db;">${c.def}</span></div>
                <div>💥暴击: <span style="color:#f1c40f;">${(c.critRate*100).toFixed(0)}%</span></div>
                <div>👁️视野: ${actualVision * 100} 米</div>
                <div>🏃移速: ${getSpeedDesc(c.baseSpeed)}</div>
                <div>🗡️攻速: ${getAtkSpeedDesc(c.atkSpeed)}</div>
                <div style="grid-column: span 2;">🌊移动: <span style="color:#00cec9;">${c.moveType}</span></div>

                ${talentHTML}
            </div>
        </div>
    `;
}

function getLegendaryGradient(ctx, x, y, width, height) {
    let grad = ctx.createLinearGradient(x, y, x + width, y + height);
    grad.addColorStop(0, "#ff9a9e"); 
    grad.addColorStop(0.3, "#fecfef"); 
    grad.addColorStop(0.6, "#a1c4fd"); 
    grad.addColorStop(1, "#c2e9fb"); 
    return grad;
}

function drawSingleCreatureShape(ctx, c, renderX, renderY, pixelScale) {
    let minX=999, minY=999, maxX=-999, maxY=-999;
    c.pixels.forEach(p => {
        if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
        if(p.y < minY) minY=p.y; if(p.y > maxY) maxY=p.y;
    });

    let outlineColor = "rgba(255, 255, 255, 0.2)"; 
    if (c.rarity === "稀有") outlineColor = "rgba(52, 152, 219, 0.6)"; 
    else if (c.rarity === "超稀有") outlineColor = "rgba(155, 89, 182, 0.8)"; 
    else if (c.rarity === "传说") outlineColor = "rgba(241, 196, 15, 1.0)"; 

    ctx.fillStyle = outlineColor;
    c.pixels.forEach(p => {
        let neighbors = [[0,-1], [0,1], [-1,0], [1,0]];
        neighbors.forEach(n => {
            if (!c.pixels.some(cp => cp.x === p.x + n[0] && cp.y === p.y + n[1])) {
                let zx = Math.floor((renderX + p.x + n[0]) * pixelScale);
                let zy = Math.floor((renderY + p.y + n[1]) * pixelScale);
                let zw = Math.ceil((renderX + p.x + n[0] + 1) * pixelScale) - zx;
                let zh = Math.ceil((renderY + p.y + n[1] + 1) * pixelScale) - zy;
                ctx.fillRect(zx, zy, zw, zh);
            }
        });
    });

    if (c.rarity === "传说") {
        let zx = Math.floor((renderX + minX) * pixelScale);
        let zy = Math.floor((renderY + minY) * pixelScale);
        let zw = Math.ceil((renderX + maxX + 1) * pixelScale) - zx;
        let zh = Math.ceil((renderY + maxY + 1) * pixelScale) - zy;
        ctx.fillStyle = getLegendaryGradient(ctx, zx, zy, zw, zh);
    } else {
        ctx.fillStyle = c.color;
    }

    c.pixels.forEach(p => {
        let zx = Math.floor((renderX + p.x) * pixelScale);
        let zy = Math.floor((renderY + p.y) * pixelScale);
        let zw = Math.ceil((renderX + p.x + 1) * pixelScale) - zx;
        let zh = Math.ceil((renderY + p.y + 1) * pixelScale) - zy;
        ctx.fillRect(zx, zy, zw, zh);
    });
}

function drawCreatureMiniature(c, canvasId) {
    let canvas = document.getElementById(canvasId);
    if(!canvas) return;
    let ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    let minX=999, minY=999, maxX=-999, maxY=-999;
    c.pixels.forEach(p => {
        if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
        if(p.y < minY) minY=p.y; if(p.y > maxY) maxY=p.y;
    });
    
    let w = maxX - minX + 1;
    let h = maxY - minY + 1;
    let scale = Math.min(canvas.width / w, canvas.height / h) * 0.7; 
    let offsetX = (canvas.width - w * scale) / 2 - minX * scale;
    let offsetY = (canvas.height - h * scale) / 2 - minY * scale;
    
    drawSingleCreatureShape(ctx, c, offsetX / scale, offsetY / scale, scale);
}

function hexToRgba(hex, alpha) {
    if(!hex || !hex.startsWith("#")) return "rgba(255,255,255," + alpha + ")";
    let r = parseInt(hex.slice(1, 3), 16);
    let g = parseInt(hex.slice(3, 5), 16);
    let b = parseInt(hex.slice(5, 7), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
}

    setupAudio: function() {
        const slider = document.getElementById('volume-slider');
        let vol = slider.value / 100;
        this.bgmDay.volume = this.isDay ? vol : 0;
        this.bgmNight.volume = this.isDay ? 0 : vol;
        
        slider.oninput = (e) => {
            let target = e.target.value / 100;
            if (this.isDay) this.bgmDay.volume = target;
            else this.bgmNight.volume = target;
        };
        
        let interacted = false;
        document.body.addEventListener('click', () => {
            if(!interacted && slider.value > 0) {
                if(this.isDay) this.bgmDay.play().catch(()=>{});
                else this.bgmNight.play().catch(()=>{});
                interacted = true;
            }
        });
    },
    
    switchBGM: function() {
        let slider = document.getElementById('volume-slider');
        let targetVol = slider.value / 100;
        if(targetVol <= 0) return;

        let outAudio = this.isDay ? this.bgmNight : this.bgmDay;
        let inAudio = this.isDay ? this.bgmDay : this.bgmNight;

        if (inAudio.paused) inAudio.play().catch(()=>{});

        let steps = 20;
        let fadeTime = 2000;
        let stepTime = fadeTime / steps;
        let volStep = targetVol / steps;

        inAudio.volume = 0;

        let step = 0;
        let fadeInterval = setInterval(() => {
            step++;
            outAudio.volume = Math.max(0, outAudio.volume - volStep);
            inAudio.volume = Math.min(targetVol, inAudio.volume + volStep);
            if(step >= steps) {
                clearInterval(fadeInterval);
                outAudio.pause();
                inAudio.volume = document.getElementById('volume-slider').value / 100;
            }
        }, stepTime);
    },

    loadExcel: function() {
        // 直接从同级目录抓取文件（在 GitHub 上完美运行）
        fetch('ShanHai_Data.xlsx').then(res => {
            if(!res.ok) throw new Error("File not found");
            return res.arrayBuffer();
        }).then(data => {
            this.parseExcelData(data);
            let status = document.getElementById('excel-status');
            status.innerText = `法则载入成功! (卷宗:${DB_TALENTS.length}篇)`;
            status.style.color = '#44bd32';
        }).catch(err => {
            // 如果 GitHub 上没找到文件，只显示红字提示
            let status = document.getElementById('excel-status');
            status.innerText = `⚠️ 读取失败！请确保 ShanHai_Data.xlsx 已上传至 GitHub 同目录`;
            status.style.color = '#e74c3c';
        });
    },
    parseExcelData: function(dataArrayBuffer) {
        let workbook = XLSX.read(new Uint8Array(dataArrayBuffer), {type: 'array'});
        for(let name of workbook.SheetNames) {
            let sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
            if(sheetData.length > 0 && sheetData[0].hasOwnProperty('TalentID')) { DB_TALENTS = sheetData; break; }
        }
        for(let name of workbook.SheetNames) {
            let sheetData = XLSX.utils.sheet_to_json(workbook.Sheets[name]);
            if(sheetData.length > 0 && sheetData[0].hasOwnProperty('LegendID')) {
                DB_LEGENDS = sheetData;
                DB_LEGENDS.forEach(l => { 
                    if(typeof l.TalentIDs === 'string') l.TalentIDs = l.TalentIDs.split(',').map(Number); 
                    if(typeof l.TalentIDs === 'number') l.TalentIDs = [l.TalentIDs]; 
                });
                break;
            }
        }
    },

    triggerTalent: function(eventStr, selfObj, targetObj, baseValue) {
        let result = baseValue;
        if(!selfObj.talents || selfObj.talents.length === 0) return result;
        
        selfObj.talents.forEach(tID => {
            let talentInfo = DB_TALENTS.find(t => t.TalentID == tID);
            if(talentInfo && talentInfo.ExecCode) {
                try {
                    let fn = new Function('event', 'self', 'target', 'value', talentInfo.ExecCode);
                    let ret = fn(eventStr, selfObj, targetObj, result);
                    if(ret !== undefined) result = ret; 
                } catch(err) {
                    console.error("天赋执行报错:", talentInfo.Name, err);
                }
            }
        });
        return result;
    },
    
    initUI: function() {

    addFloatingText: function(x, y, text, color, size = 14) {
        this.floatingTexts.push({ x: x, y: y - 0.5, text: text, color: color, size: size, life: 60 });
    },
    
    generateMap: function(type) {
        this.grid = [];
        Noise.seed = Math.random();
        let hasOcean = Math.random() < 0.6; 
        for(let y=0; y<this.height; y++) {
            let row = [];
            for(let x=0; x<this.width; x++) {
                if(type === 'noise') {
                    let v = Noise.get(x, y, 0.02); 
                    let detail = Noise.get(x, y, 0.1) * 0.2; 
                    v = (v + detail) / 1.2;
                    
                    if(hasOcean) {
                        let nx = Math.abs(x - this.width/2) / (this.width/2);
                        let ny = Math.abs(y - this.height/2) / (this.height/2);
                        let edgeDist = Math.max(nx, ny);
                        if (edgeDist > 0.6) v -= (edgeDist - 0.6) * 1.5; 
                    }
                    
                    let t = 2; 
                    if(v < 0.25) t = 0; 
                    else if(v < 0.35) t = 1; 
                    else if(v < 0.55) t = 2; 
                    else if(v < 0.70) t = 3; 
                    else if(v < 0.85) t = 4; 
                    else if(v < 0.95) t = 5; 
                    else t = 6; 
                    
                    row.push(Math.max(0, t));
                } else {
                    row.push(2); 
                }
            }
            this.grid.push(row);
        }
        
        let rect = this.wrapper.getBoundingClientRect();
        this.canvas.width = rect.width;
        this.canvas.height = rect.height;
        this.cameraX = (rect.width - this.width * this.zoom) / 2;
        this.cameraY = (rect.height - this.height * this.zoom) / 2;
        
        this.draw();
    },

            this.vfxList = [];

            this.updateRightSidebar();

        this.logEvent(`${rarityTitle} 随着天地异象，${getColoredName(c)} 降临了！`);
