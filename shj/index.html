    },
    
    bindEvents: function() {
        this.wrapper.addEventListener('touchstart', (e) => { e.preventDefault(); }, {passive: false});
        this.wrapper.addEventListener('touchmove', (e) => { e.preventDefault(); }, {passive: false});

        this.wrapper.addEventListener('pointerdown', (e) => {
            let rect = this.wrapper.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;

            if (this.placingCreature) {
                let pos = this.getGridPos(mouseX, mouseY);
                this.placingCreature.x = pos.x;
                this.placingCreature.y = pos.y;
                this.placingCreature.spawnX = pos.x; 
                this.placingCreature.spawnY = pos.y;
                
                this.creatures.push(this.placingCreature);
                
                let rColor = RARITY_COLORS[this.placingCreature.rarity] || "#fff";
                this.vfxList.push({ type: 'pillar', x: pos.x + this.placingCreature.cxOffset - 0.5, y: pos.y + this.placingCreature.cyOffset - 0.5, color: rColor, life: 60, maxLife: 60 });
                
                let rarityTitle = this.placingCreature.rarity === '传说' ? '🌈' : (this.placingCreature.rarity === '超稀有' ? '✨' : '');
                this.logEvent(`${rarityTitle} ${getColoredName(this.placingCreature)} 降临了！`);
                
                this.placingCreature = null;
                this.wrapper.classList.remove('placing');
                document.getElementById('tips').style.display = 'none';
                this.updateCreatureList();
                return;
            }

            this.dragStartX = mouseX;
            this.dragStartY = mouseY;

            if (this.selectedTerrain !== null) {
                this.isDrawing = true;
                this.paintGrid(mouseX, mouseY);
            } else {
                this.isDragging = true;
            }
        });
        
        window.addEventListener('pointerup', (e) => {
            if(this.isDrawing) this.isDrawing = false;
            if(this.isDragging) {
                this.isDragging = false;
                let rect = this.wrapper.getBoundingClientRect();
                let mouseX = e.clientX - rect.left;
                let mouseY = e.clientY - rect.top;
                if(Math.abs(mouseX - this.dragStartX) < 5 && Math.abs(mouseY - this.dragStartY) < 5) {
                    this.handleCanvasClick(mouseX, mouseY);
                }
            }
        });

        this.wrapper.addEventListener('pointermove', (e) => {
            let rect = this.wrapper.getBoundingClientRect();
            let mouseX = e.clientX - rect.left;
            let mouseY = e.clientY - rect.top;
            this.mouseX = mouseX;
            this.mouseY = mouseY;

            if (this.isDrawing && this.selectedTerrain !== null) {
                this.paintGrid(mouseX, mouseY);
            } else if (this.isDragging) {
                this.cameraX += (mouseX - this.dragStartX);
                this.cameraY += (mouseY - this.dragStartY);
                this.dragStartX = mouseX;
                this.dragStartY = mouseY;
                this.draw(); 
            }
        });
    },

    handleCanvasClick: function(mx, my) {
        let pos = this.getGridPos(mx, my);
        let clickedCreature = null;
        for(let c of this.creatures) {
            for(let p of c.pixels) {
                if(c.x + p.x === pos.x && c.y + p.y === pos.y) {
                    clickedCreature = c; break;
                }
            }
            if(clickedCreature) break;
        }
        
        if(clickedCreature) {
            if(this.selectedCreature === clickedCreature) this.isDetailExpanded = !this.isDetailExpanded;
            else { this.selectedCreature = clickedCreature; this.isDetailExpanded = true; }
        } else {
            this.selectedCreature = null; 
            this.isDetailExpanded = false;
        }
        this.updateRightSidebar();
        this.updateCreatureList();
    },

    selectCreature: function(id) {
        let target = this.creatures.find(c => c.id === id);
        if(!target) return;
        if (this.selectedCreature === target) this.isDetailExpanded = !this.isDetailExpanded;
        else { this.selectedCreature = target; this.isDetailExpanded = true; }
        this.updateRightSidebar();
        this.updateCreatureList();
    },
    
    getGridPos: function(mx, my) {
        let x = Math.floor((mx - this.cameraX) / this.zoom);
        let y = Math.floor((my - this.cameraY) / this.zoom);
        return {x, y};
    },
    
    paintGrid: function(mx, my) {
        let pos = this.getGridPos(mx, my);
        let bs = Math.floor(this.brushSize / 2);
        for(let dy=-bs; dy<=bs; dy++) {
            for(let dx=-bs; dx<=bs; dx++) {
                let px = pos.x + dx, py = pos.y + dy;
                if(px >= 0 && px < this.width && py >= 0 && py < this.height) {
                    this.grid[py][px] = this.selectedTerrain;
                }
            }
        }
    },

    openGacha: function() {
        this.updateUI();
        
        let cards = document.getElementById('gacha-cards');
        cards.innerHTML = '';
        
        for(let i=0; i<3; i++) {
            let c = CreatureFactory.generateGachaCreature();
            let div = document.createElement('div');
            let canvasId = `gacha-canvas-${i}`;
            
            div.innerHTML = generateUnifiedCardHTML(c, canvasId, false);
            div.className = ''; 
            
            div.querySelector('.unified-card').onclick = () => {
                this.placingCreature = c;
                this.wrapper.classList.add('placing');
                document.getElementById('gacha-modal').style.display = 'none';
                document.getElementById('tips').style.display = 'block';
            };
            
            cards.appendChild(div);
            drawCreatureMiniature(c, canvasId);
        }
        document.getElementById('gacha-modal').style.display = 'flex';
    },

    updateUI: function() {
        let progTxt = document.getElementById('time-txt');
        let progBar = document.getElementById('time-progress');
        progTxt.innerText = this.isDay ? "☀ 日间" : "🌙 夜间";
        progTxt.style.color = this.isDay ? "#fbc531" : "#a29bfe";
        
        let cycleTicks = this.dayDurationTicks + this.nightDurationTicks;
        let tickInCycle = this.tickCount % cycleTicks;
        let percent = 0;
        
        if (this.isDay) percent = (tickInCycle / this.dayDurationTicks) * 100;
        else percent = ((tickInCycle - this.dayDurationTicks) / this.nightDurationTicks) * 100;

        progBar.style.width = percent + "%";
        progBar.style.background = this.isDay ? "#fbc531" : "#a29bfe";
        progBar.style.boxShadow = this.isDay ? "0 0 10px #fbc531" : "0 0 10px #a29bfe";
    },

    updateCreatureList: function() {
        let listDiv = document.getElementById('creature-list');
        let sorted = [...this.creatures].sort((a, b) => {
            let rA = {"传说":4, "超稀有":3, "稀有":2, "普通":1}[a.rarity] || 0;
            let rB = {"传说":4, "超稀有":3, "稀有":2, "普通":1}[b.rarity] || 0;
            if (rA !== rB) return rB - rA;
            return b.hp - a.hp; 
        });
        
        let html = '';
        sorted.forEach(c => {
            let rColor = RARITY_COLORS[c.rarity];
            let isActive = (this.selectedCreature === c && this.isDetailExpanded) ? 'active' : '';
            html += `
                <div class="list-item ${isActive}" onclick="Game.selectCreature(${c.id})">
                    <canvas id="list-canvas-${c.id}" width="36" height="36" style="background:rgba(0,0,0,0.5); border-radius:4px; flex-shrink:0;"></canvas>
                    <div style="flex:1; overflow:hidden;">
                        <div style="color:${rColor}; font-weight:bold; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${c.name}</div>
                        <div style="font-size:11px; color:#94a3b8;">HP: <span style="color:#2ecc71;">${c.hp}</span>/${c.maxHp}</div>
                    </div>
                </div>
            `;
        });
        listDiv.innerHTML = html;
        sorted.forEach(c => drawCreatureMiniature(c, `list-canvas-${c.id}`));
    },

    updateRightSidebar: function() {
        const container = document.getElementById('info-panel-container');
        if(!this.selectedCreature || this.selectedCreature._isDead || !this.isDetailExpanded) {
            container.style.display = 'none';
            return;
        }
        container.style.display = 'block';
        let c = this.selectedCreature;
        let canvasId = 'sidebar-canvas-info';
        
        container.innerHTML = generateUnifiedCardHTML(c, canvasId, true);
        drawCreatureMiniature(c, canvasId);
    },
    
    loop: function() {
        if (!this.isPaused) {
            this.tickCount++;
            let cycleTicks = this.dayDurationTicks + this.nightDurationTicks;
            let isNowDay = (this.tickCount % cycleTicks) < this.dayDurationTicks;
            
            if (this.isDay !== isNowDay) {
                this.isDay = isNowDay;
                this.updateUI();
                this.switchBGM();
                if(this.isDay) this.logEvent(`☀️ 旭日东升，万物生光辉...`);
                else this.logEvent(`🌙 夜幕降临，山海之间杀机暗涌...`);
            }
            if(this.tickCount % 10 === 0) {
                this.updateUI();
                if(this.selectedCreature) this.updateRightSidebar();
            }
            this.updateLogic();
        }
        this.draw(); 
        requestAnimationFrame(this.loop.bind(this));
    },
    
    die: function(c) {
        if (c._isDead) return;
        c._isDead = true;
        c.hp = 0; 
        
        this.triggerTalent('onDeath', c, null, 0); 
        
        this.corpses.push({ 
            x: c.x, y: c.y, cxOffset: c.cxOffset, cyOffset: c.cyOffset,
            pixels: JSON.parse(JSON.stringify(c.pixels)), color: '#333',
            talents: c.talents ? [...c.talents] : [] 
        });
        this.vfxList.push({ type: 'skull', x: c.x + c.cxOffset - 0.5, y: c.y + c.cyOffset - 0.5, life: 60, maxLife: 60 });
    },
    
    // 【核心修复】：重新加入遗失的 eatCorpse 函数
    eatCorpse: function(c, corpse, corpseIndex) {
        let cp = Game.corpses[corpseIndex];
        if(!cp || cp !== corpse) return; 

        if(cp.pixels.length > 0) {
            let p = cp.pixels.pop();
            c.pixels.push({x: p.x + Math.floor(Math.random()*2), y: p.y + Math.floor(Math.random()*2)}); 
            c.maxHp += 10; c.hp += 10; c.atk += 1; c.def += 0.5;
            this.triggerTalent('onEat', c, cp, 0); 
            this.addFloatingText(c.x, c.y, "+10", "#2ecc71", 14);
            
            if(Math.random() < 0.2 && cp.talents && cp.talents.length > 0) {
                // 绝对防偷学机制
                let normalTalents = cp.talents.filter(t=> {
                    let d = DB_TALENTS.find(tt=>tt.TalentID===t);
                    return d && d.Rarity !== '专属';
                });
                if (normalTalents.length > 0) {
                    let stealId = normalTalents[Math.floor(Math.random() * normalTalents.length)];
                    if(!c.talents.includes(stealId)) {
                        c.talents.push(stealId);
                        this.addFloatingText(c.x, c.y, "领悟天赋!", "#f1c40f", 16);
                    }
                }
            }
        }
        if(cp.pixels.length === 0) this.corpses.splice(corpseIndex, 1);
        c.actionCooldown = Math.max(1, Math.floor(c.atkSpeed * 60)); 
    },

    updateLogic: function() {
        // 第一阶段：超强花式弹道计算与像素级精准碰撞
        for(let i = this.projectiles.length - 1; i >= 0; i--) {
            let p = this.projectiles[i];
            
            if(p.isOrbital) {
                let owner = this.creatures.find(cr => cr.id === p.ownerId);
                if(!owner || owner._isDead) { this.projectiles.splice(i,1); continue; }
                p.angle += p.speed;
                p.x = owner.x + owner.cxOffset + Math.cos(p.angle) * p.radius;
                p.y = owner.y + owner.cyOffset + Math.sin(p.angle) * p.radius;
            } 
            else if(p.isLaser) {
                let owner = this.creatures.find(cr => cr.id === p.ownerId);
                if(!owner || owner._isDead) { this.projectiles.splice(i,1); continue; }
                p.life--;
                if(p.life<=0){ this.projectiles.splice(i,1); continue; }
                p.angle += p.spinSpeed;
                p.x = owner.x + owner.cxOffset;
                p.y = owner.y + owner.cyOffset;
            }
            else {
                if(p.homing && p.targetId){
                    let t = this.creatures.find(cr=>cr.id===p.targetId);
                    if(t && !t._isDead){
                        let dx = t.x+t.cxOffset - p.x;
                        let dy = t.y+t.cyOffset - p.y;
                        let dist = Math.hypot(dx, dy) || 0.1;
                        p.vx = (dx/dist)*p.speed;
                        p.vy = (dy/dist)*p.speed;
                    }
                }
                
                if(p.blackhole){
                    this.creatures.forEach(c=>{
                        if(c.id!==p.ownerId && !c._isDead){
                            let d = Math.hypot(c.x-p.x, c.y-p.y);
                            if(d<=15 && d>0.5){
                                c.x += (p.x-c.x)/d * 0.2;
                                c.y += (p.y-c.y)/d * 0.2;
                            }
                        }
                    });
                }
                
                p.x += p.vx;
                p.y += p.vy;
                p.traveled += p.speed;
                
                if(p.boomerang){
                    if(!p.isReturning && p.traveled >= p.maxDist){
                        p.isReturning = true;
                        p.traveled = 0;
                        if(p.hitTargets) p.hitTargets = []; 
                    }
                    if(p.isReturning){
                        let owner = this.creatures.find(cr => cr.id === p.ownerId);
                        if(!owner || owner._isDead) { this.projectiles.splice(i,1); continue; }
                        let dx = owner.x+owner.cxOffset - p.x;
                        let dy = owner.y+owner.cyOffset - p.y;
                        let dist = Math.hypot(dx, dy);
                        if(dist < 1) { this.projectiles.splice(i,1); continue; }
                        p.vx = (dx/dist)*p.speed;
                        p.vy = (dy/dist)*p.speed;
                    }
                }
            }

            let hit = false;
            let hitCreature = null;
            
            // 【引擎升级】激光碰撞判定：像素级精准计算
            if(p.isLaser){
                let owner = this.creatures.find(cr => cr.id === p.ownerId);
                if(owner && !owner._isDead){
                    let ox = owner.x + owner.cxOffset;
                    let oy = owner.y + owner.cyOffset;
                    let lx = Math.cos(p.angle);
                    let ly = Math.sin(p.angle);
                    
                    this.creatures.forEach(c=>{
                        if(c.id !== p.ownerId && !c._isDead){
                            let hitLaser = false;
                            for(let px of c.pixels) {
                                let pxCenter = c.x + px.x + 0.5;
                                let pyCenter = c.y + px.y + 0.5;
                                let dx = pxCenter - ox;
                                let dy = pyCenter - oy;
                                let dot = dx * lx + dy * ly; 
                                if(dot > 0 && dot <= p.length) { 
                                    let distToLaser = Math.abs(dx * ly - dy * lx); 
                                    // 只要激光擦到身体任何一个像素边缘就算命中
                                    if(distToLaser <= 1.5) { 
                                        hitLaser = true;
                                        break;
                                    }
                                }
                            }
                            if(hitLaser){
                                if(!p.hitTargets) p.hitTargets = [];
                                if(!p.hitTargets.includes(c.id)){
                                    p.hitTargets.push(c.id);
                                    c.hp -= p.damage;
                                    this.addFloatingText(c.x, c.y, `-${p.damage}(射线)`, p.color, 16);
                                  if(c.hp <= 0) {
                                        this.triggerTalent('onKill', owner, c, 0);
                                        owner.kills = (owner.kills || 0) + 1; // 激光的主人叫 owner
                                        this.logEvent(`💀 震惊！<span style="color:${c.color}">[${c.name}]</span> 被射线灰飞烟灭！`);
                                        this.die(c);
                                    }
                                }
                            }
                        }
                    });
                }
                continue; 
            }

            // 【引擎升级】普通子弹碰撞判定：像素级精准计算
            for(let j=0; j<this.creatures.length; j++) {
                let c = this.creatures[j];
                if(c.id === p.ownerId || c._isDead) continue;
                if(p.hitTargets && p.hitTargets.includes(c.id)) continue; 
                
                let hitCurrent = false;
                for(let px of c.pixels) {
                    let pxCenter = c.x + px.x + 0.5;
                    let pyCenter = c.y + px.y + 0.5;
                    // 只要子弹距离任何一个身体像素小于1.5个网格，即视为命中身体！
                    if(Math.hypot(p.x - pxCenter, p.y - pyCenter) <= 1.5) {
                        hitCurrent = true;
                        break;
                    }
                }
                
                if(hitCurrent) {
                    hit = true;
                    hitCreature = c;
                    
                    if(p.healAmt > 0){
                        c.hp = Math.min(c.maxHp, c.hp + p.healAmt);
                        this.addFloatingText(c.x, c.y, `+${p.healAmt}(治疗)`, '#2ecc71', 16);
                    } else {
                        c.hp -= p.damage;
                        this.addFloatingText(c.x, c.y, `-${p.damage}`, p.color, 16);
                        if(p.freeze) c.actionCooldown += 60;
                    }
                    
                    let attacker = this.creatures.find(cr => cr.id === p.ownerId);
                    
                    if (c.hp > 0 && p.damage > 0) {
                        if(attacker) {
                            if(!c.enemyTarget) c.actionCooldown = 0;
                            c.enemyTarget = attacker;
                        }
                  } else if (c.hp <= 0 && p.damage > 0) {
                        if (attacker) {
                            this.triggerTalent('onKill', attacker, c, 0);
                            attacker.kills = (attacker.kills || 0) + 1; // 子弹的主人叫 attacker
                            if(p.lifesteal) {
                                attacker.hp = Math.min(attacker.maxHp, attacker.hp + p.damage);
                                this.addFloatingText(attacker.x, attacker.y, '吸血', '#8e44ad');
                            }
                        }
                        this.logEvent(`💀 震惊！<span style="color:${c.color}">[${c.name}]</span> 被无情轰杀了！`);
                        this.die(c); 
                    }
                    
                    if(p.pierce || p.isOrbital){
                        if(!p.hitTargets) p.hitTargets = [];
                        p.hitTargets.push(c.id);
                        hit = false; // 穿透弹不销毁本体
                    }
                    break;
                }
            }

            if(hit) {
                if(!isNaN(p.x) && !isNaN(p.y)) this.vfxList.push({type: 'explosion', x: p.x, y: p.y, color: p.color, life: 15, maxLife: 15});
                
                if(p.bounce && p.bounce > 0 && hitCreature){
                    let nextTarget = this.creatures.find(c=>c!==hitCreature && c.id!==p.ownerId && !c._isDead && Math.hypot(c.x-p.x, c.y-p.y)<=15);
                    if(nextTarget){
                        p.bounce--;
                        let dx = nextTarget.x+nextTarget.cxOffset - p.x;
                        let dy = nextTarget.y+nextTarget.cyOffset - p.y;
                        let dist = Math.hypot(dx,dy) || 0.1;
                        p.vx = (dx/dist)*p.speed;
                        p.vy = (dy/dist)*p.speed;
                        p.traveled = 0;
                    } else {
                        this.projectiles.splice(i, 1);
                    }
                }
                else if(p.split && p.split > 0){
                    for(let s=0; s<p.split; s++){
                        let angle = (Math.PI*2/p.split)*s;
                        this.projectiles.push({ownerId: p.ownerId, x:p.x, y:p.y, vx:Math.cos(angle)*p.speed, vy:Math.sin(angle)*p.speed, speed:p.speed, traveled:0, maxDist:50, damage:Math.floor(p.damage/2), color:p.color});
                    }
                    this.projectiles.splice(i, 1);
                }
                else {
                    this.projectiles.splice(i, 1);
                }
                
            } else if (!p.isOrbital && !p.boomerang && p.traveled >= p.maxDist) {
                if(p.split && p.split > 0){
                    for(let s=0; s<p.split; s++){
                        let angle = (Math.PI*2/p.split)*s;
                        this.projectiles.push({ownerId: p.ownerId, x:p.x, y:p.y, vx:Math.cos(angle)*p.speed, vy:Math.sin(angle)*p.speed, speed:p.speed, traveled:0, maxDist:50, damage:Math.floor(p.damage/2), color:p.color});
                    }
                } else if(!isNaN(p.x) && !isNaN(p.y) && !p.blackhole) {
                    this.addFloatingText(Math.floor(p.x), Math.floor(p.y), '消散', '#e74c3c', 12);
                    this.vfxList.push({type: 'explosion', x: p.x, y: p.y, color: '#e74c3c', life: 10, maxLife: 10});
                }
                this.projectiles.splice(i, 1);
            }
        }

        // 第二阶段：生物行为计算
        for(let i = this.creatures.length - 1; i >= 0; i--) {
            let c = this.creatures[i];
            
            if (!c || c._isDead) continue; 
            
            if (c.migTicks !== undefined && c.migTicks > 0) c.migTicks--;
            if (c.unpTicks !== undefined && c.unpTicks > 0) c.unpTicks--;

            if(c.hp <= 0) {
                this.die(c);
                continue;
            }
            
            if(c.actionCooldown > 0) { c.actionCooldown--; continue; }
            
            let isFlying = c.moveType.includes("空") || c.moveType.includes("飞行");
            let tID = (this.grid[c.y] && this.grid[c.y][c.x]) !== undefined ? this.grid[c.y][c.x] : 2;
            let inLava = tID === 7;
            let onSnow = tID === 6;

            if(!isFlying && inLava) {
                if(this.tickCount % 60 === c.id % 60) {
                    c.hp -= 100;
                    this.addFloatingText(c.x, c.y, "-100", "#e74c3c", 16);
                }
                if(!c.escapeDir) c.escapeDir = { x: Math.random()>0.5?1:-1, y: Math.random()>0.5?1:-1 };
                this.applyMove(c, c.escapeDir.x, c.escapeDir.y, true); 
                continue;
            } else {
                c.escapeDir = null; 
            }

            let baseVision = this.isDay ? c.dayVision : c.nightVision;
            let actualVision = this.triggerTalent('onVision', c, null, baseVision);
            let speedMultiplier = (!isFlying && onSnow) ? 2 : 1; 
            
            let cCenterX = c.x + c.cxOffset;
            let cCenterY = c.y + c.cyOffset;

            if (c.personality === "胆小") {
                let hpRatio = c.hp / c.maxHp;
                let lastRatio = (c.lastHp || c.hp) / c.maxHp;
                if (hpRatio <= 0.5 && lastRatio > 0.5) c.forceFlee = true;
                if (hpRatio <= 0.3 && lastRatio > 0.3) c.forceFlee = true;
                c.lastHp = c.hp;
            }

            let nearestEnemy = null, minDist = 99999;
            let nearestStrongEnemy = null, minStrongDist = 99999;

            for(let j=0; j<this.creatures.length; j++) {
                if(i===j) continue;
                let other = this.creatures[j];
                
                if (other._isDead) continue; 

                let otherCenterX = other.x + other.cxOffset;
                let otherCenterY = other.y + other.cyOffset;

                if (c.movePattern === "领主") {
                    let distToSpawn = Math.hypot(otherCenterX - (c.spawnX + c.cxOffset), otherCenterY - (c.spawnY + c.cyOffset));
                    if (distToSpawn > actualVision) continue; 
                }

                let dist = Math.hypot(cCenterX - otherCenterX, cCenterY - otherCenterY);
                if(dist <= actualVision) { 
                    if(dist < minDist) { minDist = dist; nearestEnemy = other; }
                    if(c.personality === "胆小" && other.atk > c.atk && dist < minStrongDist) { 
                        minStrongDist = dist; nearestStrongEnemy = other; 
                    }
                }
            }

            if (c.personality === "胆小" && !nearestEnemy) {
                c.forceFlee = false; 
            }
            
            let nearestCorpse = null, minCorpseDist = 99999;
            for(let j=0; j<this.corpses.length; j++) {
                let cp = this.corpses[j];
                let cpCenterX = cp.x + cp.cxOffset;
                let cpCenterY = cp.y + cp.cyOffset;
                let dist = Math.hypot(cCenterX - cpCenterX, cCenterY - cpCenterY);
                if(dist <= actualVision && dist < minCorpseDist) { minCorpseDist = dist; nearestCorpse = {obj: cp, index: j}; }
            }

            if (c.enemyTarget) {
                if (c.enemyTarget._isDead || c.enemyTarget.hp <= 0) {
                    c.enemyTarget = null;
                } else {
                    let targetCenterX = c.enemyTarget.x + c.enemyTarget.cxOffset;
                    let targetCenterY = c.enemyTarget.y + c.enemyTarget.cyOffset;
                    let distToAggro = Math.hypot(cCenterX - targetCenterX, cCenterY - targetCenterY);
                    
                    if (c.personality === "和平" && distToAggro > 10) c.enemyTarget = null; 
                    else if (distToAggro > actualVision * 1.5) c.enemyTarget = null; 
                }
            }

            let actionTaken = false;

            if (c.personality === "胆小" && (nearestStrongEnemy || c.forceFlee)) {
                let fleeTarget = nearestStrongEnemy || nearestEnemy;
                if (fleeTarget) {
                    this.moveTowards(c, fleeTarget.x, fleeTarget.y, true, speedMultiplier);
                    actionTaken = true;
                }
            }

            if (!actionTaken && c.personality === "贪食" && !c.enemyTarget && nearestCorpse) {
                let eatRange = c.cxOffset + nearestCorpse.obj.cxOffset + 1.5;
                if (minCorpseDist <= eatRange) this.eatCorpse(c, nearestCorpse.obj, nearestCorpse.index);
                else this.moveTowards(c, nearestCorpse.obj.x, nearestCorpse.obj.y, false, speedMultiplier);
                actionTaken = true;
            }

            if (!actionTaken) {
                let combatTarget = c.enemyTarget;
                if (!combatTarget && nearestEnemy) {
                    if (c.personality === "和平") { } 
                    else if (c.personality === "懒惰") {
                        if (minDist <= actualVision * 0.3) combatTarget = nearestEnemy;
                    } 
                    else if (c.personality === "胆小") {
                        if (c.atk > nearestEnemy.atk) combatTarget = nearestEnemy; 
                    } 
                    else combatTarget = nearestEnemy; 
                }

                if (combatTarget) {
                    let targetCenterX = combatTarget.x + combatTarget.cxOffset;
                    let targetCenterY = combatTarget.y + combatTarget.cyOffset;
                    let distToTarget = Math.hypot(cCenterX - targetCenterX, cCenterY - targetCenterY);
                    let meleeRange = c.cxOffset + combatTarget.cxOffset + 1.5;
                    
                    if (distToTarget <= meleeRange) this.attack(c, combatTarget);
                    else this.moveTowards(c, combatTarget.x, combatTarget.y, false, speedMultiplier);
                    actionTaken = true;
                }
            }

            if (!actionTaken && nearestCorpse) {
                let eatRange = c.cxOffset + nearestCorpse.obj.cxOffset + 1.5;
                if (minCorpseDist <= eatRange) this.eatCorpse(c, nearestCorpse.obj, nearestCorpse.index);
                else this.moveTowards(c, nearestCorpse.obj.x, nearestCorpse.obj.y, false, speedMultiplier);
                actionTaken = true;
            }

            if (!actionTaken) this.executeIdleMove(c, speedMultiplier, actualVision);
        }
        
        // 第三阶段：安全清理尸骸
        for(let i = this.creatures.length - 1; i >= 0; i--) {
            if (this.creatures[i] && this.creatures[i]._isDead) {
                if(this.selectedCreature === this.creatures[i]) { 
                    this.selectedCreature = null; 
                    this.isDetailExpanded = false; 
                }
                this.creatures.splice(i, 1);
            }
        }

        for(let i = this.floatingTexts.length - 1; i >= 0; i--) {
            let ft = this.floatingTexts[i];
            ft.life--; ft.y -= 0.15;
            if(ft.life <= 0) this.floatingTexts.splice(i, 1);
        }
        for(let i = this.vfxList.length - 1; i >= 0; i--) {
            this.vfxList[i].life--;
            if(this.vfxList[i].life <= 0) this.vfxList.splice(i, 1);
        }
    },
    executeIdleMove: function(c, speedMultiplier, actualVision) {
        if (c.movePattern === "领主") {
            let cCenterX = c.x + c.cxOffset;
            let cCenterY = c.y + c.cyOffset;
            let distToSpawn = Math.hypot(cCenterX - (c.spawnX + c.cxOffset), cCenterY - (c.spawnY + c.cyOffset));
            
            if (distToSpawn > actualVision || !c.territoryTarget) {
                let angle = Math.random() * Math.PI * 2;
                let r = Math.random() * actualVision;
                c.territoryTarget = {
                    x: Math.floor(c.spawnX + Math.cos(angle) * r),
                    y: Math.floor(c.spawnY + Math.sin(angle) * r)
                };
            }
            let oldX = c.x, oldY = c.y;
            this.moveTowards(c, c.territoryTarget.x, c.territoryTarget.y, false, speedMultiplier * 2); 
            if (c.x === oldX && c.y === oldY) c.territoryTarget = null; 
            else if (c.x === c.territoryTarget.x && c.y === c.territoryTarget.y) c.territoryTarget = null; 
        } 
        else if (c.movePattern === "迁徙") {
            if (c.migDir === undefined) {
                c.migDir = Math.random() * Math.PI * 2;
                c.migTicks = Math.floor((2 + Math.random() * 3) * 60);
            }
            if (c.migTicks <= 0) {
                c.migDir += (15 + Math.random() * 30) * (Math.random() < 0.5 ? 1 : -1) * Math.PI / 180;
                c.migTicks = Math.floor((2 + Math.random() * 3) * 60);
            }
            let tx = Math.floor(c.x + Math.cos(c.migDir) * 10);
            let ty = Math.floor(c.y + Math.sin(c.migDir) * 10);
            let oldX = c.x, oldY = c.y;
            this.moveTowards(c, tx, ty, false, speedMultiplier);
            if (c.x === oldX && c.y === oldY) c.migDir += Math.PI - (Math.random() * Math.PI / 2); 
        }
        else if (c.movePattern === "难以预测") {
            if (c.unpTicks === undefined || c.unpTicks <= 0) {
                let opts = [0, 1, 2, 3].filter(x => x !== c.unpState);
                c.unpState = opts[Math.floor(Math.random() * opts.length)];
                if (c.unpState === 0) { c.unpTicks = Math.floor((2 + Math.random() * 3) * 60); c.unpDir = Math.random() * Math.PI * 2; }
                else if (c.unpState === 1) { c.unpTicks = 5 * 60; }
                else if (c.unpState === 2) { c.unpTicks = Math.floor(1.5 * 60); c.unpDir = Math.random() * Math.PI * 2; }
                else if (c.unpState === 3) { c.unpTicks = 3 * 60; }
            }
            
            if (c.unpState === 0) {
                let tx = Math.floor(c.x + Math.cos(c.unpDir) * 10);
                let ty = Math.floor(c.y + Math.sin(c.unpDir) * 10);
                this.moveTowards(c, tx, ty, false, speedMultiplier);
            } else if (c.unpState === 1) {
                this.moveRandom(c, speedMultiplier);
            } else if (c.unpState === 2) {
                let tx = Math.floor(c.x + Math.cos(c.unpDir) * 10);
                let ty = Math.floor(c.y + Math.sin(c.unpDir) * 10);
                this.moveTowards(c, tx, ty, false, speedMultiplier * 0.5); 
            } else if (c.unpState === 3) {
                c.actionCooldown = 30; 
            }
        }
        else {
            this.moveRandom(c, speedMultiplier);
        }
    },

    moveTowards: function(c, tx, ty, flee, multiplier = 1) {
        let dx = 0, dy = 0;
        if(c.x < tx) dx = flee ? -1 : 1; else if(c.x > tx) dx = flee ? 1 : -1;
        if(c.y < ty) dy = flee ? -1 : 1; else if(c.y > ty) dy = flee ? 1 : -1;
        
        let moved = false;
        if(dx !== 0 && this.canWalk(c, c.x + dx, c.y)) { this.applyMove(c, dx, 0, false, multiplier); moved = true; }
        else if(dy !== 0 && this.canWalk(c, c.x, c.y + dy)) { this.applyMove(c, 0, dy, false, multiplier); moved = true; }
        else if(dx !== 0 && dy !== 0 && this.canWalk(c, c.x + dx, c.y + dy)) { this.applyMove(c, dx, dy, false, multiplier); moved = true; }
        
        if (!moved) {
            let baseTicks = Math.max(2, (10 - c.baseSpeed) * 2); 
            c.actionCooldown = Math.floor(baseTicks * multiplier); 
            
            if (!flee && Math.random() < 0.3) {
                let randomDirs = [{x:0,y:1}, {x:0,y:-1}, {x:1,y:0}, {x:-1,y:0}];
                let rDir = randomDirs[Math.floor(Math.random() * randomDirs.length)];
                if(this.canWalk(c, c.x + rDir.x, c.y + rDir.y)) {
                    c.x += rDir.x; c.y += rDir.y;
                }
            }
        }
    },
    
    moveRandom: function(c, multiplier = 1) {
        let dirs = [{x:0,y:-1}, {x:0,y:1}, {x:-1,y:0}, {x:1,y:0}];
        let d = dirs[Math.floor(Math.random() * dirs.length)];
        if(this.canWalk(c, c.x + d.x, c.y + d.y)) this.applyMove(c, d.x, d.y, false, multiplier);
    },
    
    applyMove: function(c, dx, dy, isForceEscape = false, multiplier = 1) {
        c.x += dx; c.y += dy;
        let baseTicks = Math.max(2, (10 - c.baseSpeed) * 2); 
        c.actionCooldown = Math.floor(baseTicks * multiplier); 
        if(isForceEscape) c.actionCooldown = Math.max(1, baseTicks - 2); 
    },
    
    canWalk: function(c, nx, ny) {
        if(nx < 0 || nx >= this.width || ny < 0 || ny >= this.height) return false;
        let tID = this.grid[ny][nx];
        return TERRAIN_TYPES[tID].walkable.includes(c.moveType);
    },
    
    attack: function(attacker, defender) {
        let rawDmg = Math.max(1, attacker.atk - defender.def);
        rawDmg = this.triggerTalent('onAttack', attacker, defender, rawDmg);
        
        let isCrit = Math.random() < attacker.critRate;
        if(isCrit) rawDmg *= 2;

        let finalDmg = Math.floor(rawDmg);
        finalDmg = this.triggerTalent('onHurt', defender, attacker, finalDmg);
        
        defender.hp -= finalDmg;
        
        let atkTicks = Math.floor(attacker.atkSpeed * 60);
        attacker.actionCooldown = Math.max(1, atkTicks);
        
        if (defender.hp > 0) {
            if (!defender.enemyTarget) { defender.actionCooldown = 0; }
            defender.enemyTarget = attacker;
        }
        
        let minY = Math.min(...defender.pixels.map(p => p.y));
        let txtStr = `-${finalDmg}${isCrit ? '!' : ''}`;
        this.addFloatingText(defender.x, defender.y + minY, txtStr, isCrit ? "#ff9f43" : "#ff4757", isCrit ? 22 : 16);
        
       if(defender.hp <= 0) {
            this.triggerTalent('onKill', attacker, defender, 0); 
            attacker.kills = (attacker.kills || 0) + 1; // 近战的攻击者叫 attacker
            this.logEvent(`💀 震惊！${getColoredName(defender)} 惨死于 ${getColoredName(attacker)} 之手！`);
            attacker.enemyTarget = null;
            this.die(defender); 
        }
    },
    
    draw: function() {
        let rect = this.wrapper.getBoundingClientRect();
        if (this.canvas.width !== rect.width || this.canvas.height !== rect.height) {
            this.canvas.width = rect.width;
            this.canvas.height = rect.height;
        }
        
        this.ctx.fillStyle = "#5ea3d9";
        this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
        
        this.ctx.save();
        this.ctx.translate(this.cameraX, this.cameraY); 

        for(let y=0; y<this.height; y++) {
            for(let x=0; x<this.width; x++) {
                this.ctx.fillStyle = TERRAIN_TYPES[this.grid[y][x]].color;
                
                let zx = Math.floor(x * this.zoom);
                let zy = Math.floor(y * this.zoom);
                let zw = Math.ceil((x + 1) * this.zoom) - zx;
                let zh = Math.ceil((y + 1) * this.zoom) - zy;
                this.ctx.fillRect(zx, zy, zw, zh);
            }
        }
        
        if(!this.isDay) {
            this.ctx.save();
            this.ctx.setTransform(1, 0, 0, 1, 0, 0);
            this.ctx.fillStyle = "rgba(10, 10, 30, 0.4)";
            this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
            this.ctx.restore();
        }
        
        this.corpses.forEach(cp => {
            this.ctx.fillStyle = cp.color;
            cp.pixels.forEach(p => {
                let zx = Math.floor((cp.x + p.x) * this.zoom);
                let zy = Math.floor((cp.y + p.y) * this.zoom);
                let zw = Math.ceil((cp.x + p.x + 1) * this.zoom) - zx;
                let zh = Math.ceil((cp.y + p.y + 1) * this.zoom) - zy;
                this.ctx.fillRect(zx, zy, zw, zh);
            });
        });
        
        this.creatures.forEach(c => {
            if(c._isDead) return;
            drawSingleCreatureShape(this.ctx, c, c.x, c.y, this.zoom);
            
            if(c === this.selectedCreature) {
                let minX=999, minY=999, maxX=-999, maxY=-999;
                c.pixels.forEach(p => {
                    if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
                    if(p.y < minY) minY=p.y; if(p.y > maxY) maxY=p.y;
                });
                
                this.ctx.strokeStyle = "#fff";
                this.ctx.lineWidth = 2;
                this.ctx.strokeRect((c.x + minX - 1)*this.zoom, (c.y + minY - 1)*this.zoom, (maxX-minX+3)*this.zoom, (maxY-minY+3)*this.zoom);
                
                let baseVision = this.isDay ? c.dayVision : c.nightVision;
                let actualVision = this.triggerTalent ? this.triggerTalent('onVision', c, null, baseVision) : baseVision;
                
                this.ctx.beginPath();
                let centerX = (c.x + c.cxOffset) * this.zoom;
                let centerY = (c.y + c.cyOffset) * this.zoom;
                this.ctx.arc(centerX, centerY, actualVision * this.zoom, 0, 2 * Math.PI);
                this.ctx.fillStyle = "rgba(255, 255, 255, 0.1)";
                this.ctx.fill();
                this.ctx.strokeStyle = "rgba(255, 255, 255, 0.4)";
                this.ctx.lineWidth = 1;
                this.ctx.stroke();
            }

            let topY = Math.min(...c.pixels.map(p => p.y));
            let hBarY = (c.y + topY - 1) * this.zoom;
            let cx = (c.x + c.cxOffset) * this.zoom;
            let barW = this.zoom * 2.5;
            let barH = Math.max(2, this.zoom * 0.4);
            
            this.ctx.fillStyle = "rgba(0,0,0,0.7)";
            this.ctx.fillRect(cx - barW/2, hBarY, barW, barH);
            this.ctx.fillStyle = "#2ecc71";
            this.ctx.fillRect(cx - barW/2, hBarY, barW * (c.hp / c.maxHp), barH);
        });

        this.projectiles.forEach(p => {
            let px = p.x * this.zoom;
            let py = p.y * this.zoom;
            
            if (isNaN(px) || isNaN(py)) return;
            
            if(p.isLaser) {
                let owner = this.creatures.find(cr => cr.id === p.ownerId);
                if(owner && !owner._isDead) {
                    let ox = (owner.x + owner.cxOffset) * this.zoom;
                    let oy = (owner.y + owner.cyOffset) * this.zoom;
                    let ex = ox + Math.cos(p.angle) * p.length * this.zoom;
                    let ey = oy + Math.sin(p.angle) * p.length * this.zoom;
                    
                    this.ctx.beginPath();
                    this.ctx.moveTo(ox, oy);
                    this.ctx.lineTo(ex, ey);
                    this.ctx.strokeStyle = hexToRgba(p.color, 0.7);
                    this.ctx.lineWidth = this.zoom * 1.5;
                    this.ctx.lineCap = "round";
                    this.ctx.stroke();
                }
            } else {
                this.ctx.beginPath();
                this.ctx.arc(px, py, this.zoom * 1.5, 0, Math.PI*2);
                this.ctx.fillStyle = hexToRgba(p.color, 0.4);
                this.ctx.fill();
                
                this.ctx.beginPath();
                this.ctx.arc(px, py, this.zoom * 0.8, 0, Math.PI*2);
                this.ctx.fillStyle = p.color;
                this.ctx.fill();
            }
        });

        if(this.placingCreature) {
            let pos = this.getGridPos(this.mouseX, this.mouseY);
            this.ctx.globalAlpha = 0.7; 
            drawSingleCreatureShape(this.ctx, this.placingCreature, pos.x, pos.y, this.zoom);
            this.ctx.globalAlpha = 1.0;
        }
        
        this.vfxList.forEach(vfx => {
            let alpha = vfx.life / vfx.maxLife;
            if (vfx.type === 'pillar') {
                this.ctx.fillStyle = hexToRgba(vfx.color, alpha * 0.7);
                let px = (vfx.x * this.zoom) - this.zoom;
                let pw = this.zoom * 3;
                let ph = (vfx.y * this.zoom) + this.zoom;
                if(!isNaN(px) && !isNaN(ph)) this.ctx.fillRect(px, 0, pw, ph);
            }
            if (vfx.type === 'skull') {
                if(!isNaN(vfx.x) && !isNaN(vfx.y)) {
                    this.ctx.globalAlpha = alpha;
                    this.ctx.font = `${this.zoom * 3}px Arial`;
                    this.ctx.textAlign = "center";
                    this.ctx.textBaseline = "middle";
                    this.ctx.fillText("☠️", (vfx.x * this.zoom) + this.zoom/2, (vfx.y * this.zoom) - ((vfx.maxLife - vfx.life) * 0.5));
                    this.ctx.globalAlpha = 1.0;
                }
            }
            if (vfx.type === 'explosion') {
                if(!isNaN(vfx.x) && !isNaN(vfx.y)) {
                    this.ctx.beginPath();
                    this.ctx.arc(vfx.x * this.zoom, vfx.y * this.zoom, this.zoom * (3 - alpha*2), 0, Math.PI*2);
                    this.ctx.fillStyle = hexToRgba(vfx.color, alpha);
                    this.ctx.fill();
                }
            }
        });

        this.ctx.textAlign = "center";
        this.ctx.textBaseline = "middle";
        this.floatingTexts.forEach(ft => {
            if(!isNaN(ft.x) && !isNaN(ft.y)) {
                this.ctx.font = `bold ${ft.size}px Arial`;
                this.ctx.globalAlpha = ft.life / 60; 
                
                this.ctx.strokeStyle = "#000";
                this.ctx.lineWidth = 3;
                this.ctx.strokeText(ft.text, ft.x * this.zoom, ft.y * this.zoom);
                
                this.ctx.fillStyle = ft.color;
                this.ctx.fillText(ft.text, ft.x * this.zoom, ft.y * this.zoom);
                
                this.ctx.globalAlpha = 1.0;
            }
        });

        this.ctx.restore();
    }
};

const TalentAssigner = {
    pickRandomByWeight: function(weights, categorizedTalents) {
        let availableWeights = [];
        let total = 0;
        for(let key in weights) {
            if(weights[key] > 0 && categorizedTalents[key] && categorizedTalents[key].length > 0) {
                availableWeights.push({key: key, w: weights[key]});
                total += weights[key];
            }
        }
        if(availableWeights.length === 0) return null;
        
        let r = Math.random() * total;
        let current = 0;
        let chosenCat = availableWeights[0].key;
        for(let item of availableWeights) {
            current += item.w;
            if(r <= current) { chosenCat = item.key; break; }
        }
        let catArr = categorizedTalents[chosenCat];
        return catArr[Math.floor(Math.random() * catArr.length)];
    },

    assign: function(rarityStr) {
        let talents = [];
        if(!DB_TALENTS || DB_TALENTS.length === 0) return talents;

        let cats = { '白': [], '蓝': [], '紫': [], '橙': [] };
        DB_TALENTS.forEach(t => {
            let r = t.Rarity || '白';
            if(cats[r] && r !== '专属') cats[r].push(t.TalentID);
        });

        if (rarityStr === "普通") {
            let id = this.pickRandomByWeight({'白':10, '蓝':3, '紫':1, '橙':0}, cats);
            if(id) talents.push(id);
        }
        else if (rarityStr === "稀有") {
            let count = Math.random() < 0.5 ? 1 : 2;
            let id = this.pickRandomByWeight({'白':0, '蓝':1, '紫':0, '橙':0}, cats); 
            if(id) talents.push(id);
            for(let i=1; i<count; i++) {
                let id2 = this.pickRandomByWeight({'白':10, '蓝':10, '紫':3, '橙':0}, cats);
                if(id2 && !talents.includes(id2)) talents.push(id2);
            }
        }
        else if (rarityStr === "超稀有") {
            let count = Math.random() < 0.5 ? 2 : 3;
            let id = this.pickRandomByWeight({'白':0, '蓝':0, '紫':1, '橙':0}, cats); 
            if(id) talents.push(id);
            for(let i=1; i<count; i++) {
                let id2 = this.pickRandomByWeight({'白':10, '蓝':10, '紫':10, '橙':0}, cats);
                if(id2 && !talents.includes(id2)) talents.push(id2);
            }
        }
        else if (rarityStr === "传说") {
            let count = Math.random() < 0.5 ? 3 : 4;
            let id = this.pickRandomByWeight({'白':0, '蓝':0, '紫':0, '橙':1}, cats); 
            if(id) talents.push(id);
            for(let i=1; i<count; i++) {
                let id2 = this.pickRandomByWeight({'白':10, '蓝':10, '紫':10, '橙':3}, cats);
                if(id2 && !talents.includes(id2)) talents.push(id2);
            }
        }
        return talents;
    }
};

let DB_TALENTS_BACKUP = [...DB_TALENTS];
let DB_LEGENDS_BACKUP = [...DB_LEGENDS];

const CreatureFactory = {
    guid: 1,
    generateGachaCreature: function() {
        let roll = Math.random() * 44;
        let rarityStr = "普通";
        
        if(roll < 1) rarityStr = "传说";
        else if(roll < 4) rarityStr = "超稀有";
        else if(roll < 14) rarityStr = "稀有";

        if(rarityStr === "传说" && DB_LEGENDS.length > 0) {
            let leg = DB_LEGENDS[Math.floor(Math.random() * DB_LEGENDS.length)];
            let count = leg.SizeLevel === 4 ? 30 : (leg.SizeLevel === 3 ? 20 : (leg.SizeLevel === 2 ? 12 : 6));
            let finalTalents = TalentAssigner.assign(rarityStr); 
            if (leg.TalentIDs && leg.TalentIDs.length > 0) {
                finalTalents = [...new Set([...leg.TalentIDs, ...finalTalents])];
            }
            
            let legAtkSpd = 0.33 + Math.random() * 0.33; 
            legAtkSpd = Math.round(legAtkSpd * 100) / 100;
            return this.buildConfig(leg.Name, leg.SizeLevel, count, leg.BaseHP, leg.BaseATK, leg.BaseDEF, 0.1, 40, 5, legAtkSpd, leg.Personality, leg.MoveType, leg.Color, finalTalents, rarityStr);
        }
        
        let sizeRoll = Math.random();
        let sizeLvl = 1, minP = 4, maxP = 9;
        if(sizeRoll < 0.05) { sizeLvl = 4; minP=25; maxP=36; }
        else if(sizeRoll < 0.20) { sizeLvl = 3; minP=16; maxP=25; }
        else if(sizeRoll < 0.50) { sizeLvl = 2; minP=9; maxP=16; }
        let count = Math.floor(Math.random() * (maxP - minP + 1)) + minP;

        let multiplier = 1.0;
        if (rarityStr === "稀有") multiplier = 1.1 + Math.random() * 0.2; 
        else if (rarityStr === "超稀有") multiplier = 1.5 + Math.random() * 0.5; 
        else if (rarityStr === "传说") multiplier = 3.0 + Math.random() * 2.0; 
        
        let hp = Math.floor(100 * multiplier * (0.8 + Math.random()*0.4));
        let atk = Math.floor(15 * multiplier * (0.8 + Math.random()*0.4));
        let def = Math.floor(5 * multiplier * (0.8 + Math.random()*0.4));
        let critRate = (0.05 + Math.random() * 0.15); 
        let dayVis = Math.floor(20 + Math.random()*20); 

        if (Math.random() < 0.5) {
            let traits = ['hp', 'atk', 'def', 'crit', 'vision'];
            let buffTrait = traits[Math.floor(Math.random()*traits.length)];
            let nerfTrait = traits[Math.floor(Math.random()*traits.length)];
            
            if(buffTrait === 'hp') hp = Math.floor(hp * 1.5);
            if(nerfTrait === 'hp') hp = Math.floor(hp * 0.7);
            if(buffTrait === 'atk') atk = Math.floor(atk * 1.4);
            if(nerfTrait === 'atk') atk = Math.floor(atk * 0.7);
            if(buffTrait === 'def') def = Math.floor(def * 1.5);
            if(nerfTrait === 'def') def = Math.floor(def * 0.6);
            if(buffTrait === 'crit') critRate *= 2.0;
            if(nerfTrait === 'crit') critRate *= 0.5;
            if(buffTrait === 'vision') dayVis = Math.floor(dayVis * 1.5);
            if(nerfTrait === 'vision') dayVis = Math.floor(dayVis * 0.5);
        }

        hp = Math.floor(hp * (1 + (sizeLvl - 1) * 0.4));
        let mSpd = Math.floor(5 + Math.random()*5); 
        mSpd -= (sizeLvl - 1); 
        if (mSpd < 1) mSpd = 1;
        
        let aSpd = 0.33 + Math.random() * 0.33;
        aSpd = Math.round(aSpd * 100) / 100;
        
        let name = PREFIXES[Math.floor(Math.random()*PREFIXES.length)] + SUFFIXES[Math.floor(Math.random()*SUFFIXES.length)];
        let pers = PERSONALITIES[Math.floor(Math.random()*PERSONALITIES.length)];
        let mt = MOVE_TYPES[Math.floor(Math.random()*MOVE_TYPES.length)];
        let color = "hsl(" + Math.floor(Math.random()*360) + ", 80%, 65%)";
        let finalTalents = TalentAssigner.assign(rarityStr);

        return this.buildConfig(name, sizeLvl, count, hp, atk, def, critRate, dayVis, mSpd, aSpd, pers, mt, color, finalTalents, rarityStr);
    },
    
    buildConfig: function(name, sizeLvl, pCount, hp, atk, def, critRate, dayVis, mSpd, aSpd, pers, moveType, color, talents, rarityStr) {
        let pixels = [{x:0, y:0}];
        let dirs = [{x:0,y:1},{x:0,y:-1},{x:1,y:0},{x:-1,y:0}];
        while(pixels.length < pCount) {
            let base = pixels[Math.floor(Math.random() * pixels.length)];
            let d = dirs[Math.floor(Math.random() * dirs.length)];
            let nx = base.x + d.x, ny = base.y + d.y;
            if(!pixels.some(p => p.x === nx && p.y === ny)) pixels.push({x: nx, y: ny});
        }
        
        let minX=999, minY=999, maxX=-999, maxY=-999;
        pixels.forEach(p => {
            if(p.x < minX) minX=p.x; if(p.x > maxX) maxX=p.x;
            if(p.y < minY) minY=p.y; if(p.y > maxY) maxY=p.y;
        });
        let cxOffset = (maxX + minX) / 2 + 0.5;
        let cyOffset = (maxY + minY) / 2 + 0.5;

        let movePattern = MOVE_PATTERNS[Math.floor(Math.random() * MOVE_PATTERNS.length)];

        // --- 核心修改：寻找全场最高击杀数，并进行属性倍增 ---
        let maxKills = 1; 
        if (Game.creatures && Game.creatures.length > 0) {
            Game.creatures.forEach(c => {
                if (!c._isDead && c.kills && c.kills > maxKills) {
                    maxKills = c.kills;
                }
            });
        }
        
        let finalHp = hp * maxKills;
        let finalAtk = atk * maxKills;
        let finalDef = def * maxKills;
        // ----------------------------------------------------
        
        return {
            id: this.guid++, isCultivator: false, x: 0, y: 0, spawnX: 0, spawnY: 0, cxOffset: cxOffset, cyOffset: cyOffset,
            name: name, sizeLevel: sizeLvl, pixels: pixels, rarity: rarityStr,
            maxHp: finalHp, hp: finalHp, atk: finalAtk, def: finalDef, critRate: critRate,
            dayVision: dayVis, nightVision: Math.floor(dayVis * 0.5),
            personality: pers, moveType: moveType, movePattern: movePattern,
            baseSpeed: mSpd, atkSpeed: aSpd,  
            actionCooldown: 0, enemyTarget: null, 
            migDir: Math.random() * Math.PI * 2, migTicks: 0, 
            unpState: 0, unpTicks: 0, unpDir: 0, territoryTarget: null,
            color: color, talents: talents || [], kills: 0 // 初始化击杀数为 0
        };
    }
};

window.onload = () => Game.init();
</script>
